<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloudflare Deploy Starter</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8f7f2;
        --text: #1b1d21;
        --accent: #ff6a3d;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%);
        color: var(--text);
        font-family: "Georgia", "Times New Roman", serif;
      }

      main {
        width: min(90vw, 680px);
        padding: 2rem;
        border: 1px solid #e8e4d9;
        background: #fffdf8;
        box-shadow: 0 18px 40px rgba(27, 29, 33, 0.08);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        letter-spacing: 0.02em;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        line-height: 1.5;
      }

      code {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Deploy Ready</h1>
      <p>
        This project now has a static assets directory, so
        <code>npx wrangler deploy</code> can publish successfully.
      </p>
    </main>
  </body>
</html>
